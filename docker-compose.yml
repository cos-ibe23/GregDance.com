services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      face-service:
        condition: service_healthy
      db:
        condition: service_healthy
    volumes:
      - faces:/app/faces   

  face-service:
    build: ./face-service
    ports:
      - "5001:5001"
    volumes:
      - faces:/app/faces  
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 300s

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gregdance
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  faces: